<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra HDR Chess — Master's Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loader-content">
      <div class="loader-crown">♛</div>
      <div class="loader-title">ULTRA HDR CHESS</div>
      <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
      <div class="loader-text" id="loader-text">Initializing engine...</div>
    </div>
  </div>

  <div id="app" style="display:none">
    <header>
      <div class="header-left">
        <span class="crown-icon">♛</span>
        <span class="title-text">ULTRA HDR CHESS</span>
      </div>
      <div class="header-right">
        <button class="btn-glass" id="btn-new-game">New Game</button>
        <button class="btn-glass" id="btn-flip">Flip Board</button>
        <button class="btn-glass" id="btn-undo">Undo</button>
      </div>
    </header>

    <main>
      <aside class="panel panel-left">
        <div class="panel-section">
          <div class="panel-title">OPPONENT</div>
          <div class="ai-display">
            <div class="ai-avatar">♛</div>
            <div class="ai-info">
              <div class="ai-name">Stockfish AI</div>
              <div class="ai-rating" id="ai-rating">ELO ~3500</div>
            </div>
          </div>
          <div class="difficulty-selector">
            <label>Difficulty</label>
            <div class="diff-buttons">
              <button class="diff-btn" data-level="1">Easy</button>
              <button class="diff-btn active" data-level="5">Medium</button>
              <button class="diff-btn" data-level="10">Hard</button>
              <button class="diff-btn" data-level="20">Master</button>
            </div>
          </div>
        </div>

        <div class="panel-section">
          <div class="panel-title">CAPTURED</div>
          <div class="captured-pieces" id="captured-black"></div>
          <div class="material-score" id="material-score">0</div>
          <div class="captured-pieces" id="captured-white"></div>
        </div>

        <div class="panel-section">
          <div class="panel-title">STATUS</div>
          <div class="status-box" id="status-box">
            <div class="status-turn" id="status-turn">White to move</div>
            <div class="status-detail" id="status-detail">Game in progress</div>
          </div>
          <div id="thinking-indicator" class="thinking-indicator" style="display:none">
            <div class="thinking-dots">
              <span></span><span></span><span></span>
            </div>
            <span>AI thinking...</span>
          </div>
        </div>
      </aside>

      <div class="board-wrapper">
        <div class="board-glow"></div>
        <div id="board-container">
          <canvas id="three-canvas"></canvas>
          <div id="board-overlay">
            <div id="chess-board"></div>
          </div>
        </div>
        <div class="board-reflection"></div>
      </div>

      <aside class="panel panel-right">
        <div class="panel-section">
          <div class="panel-title">MOVE HISTORY</div>
          <div class="move-history" id="move-history"></div>
        </div>

        <div class="panel-section">
          <div class="panel-title">LAST MOVE</div>
          <div class="last-move-display" id="last-move-display">—</div>
        </div>

        <div class="panel-section">
          <div class="panel-title">SETTINGS</div>
          <div class="settings-list">
            <label class="toggle-row">
              <span>Sound Effects</span>
              <div class="toggle" id="toggle-sound">
                <div class="toggle-thumb"></div>
              </div>
            </label>
            <label class="toggle-row">
              <span>Show Legal Moves</span>
              <div class="toggle active" id="toggle-hints">
                <div class="toggle-thumb"></div>
              </div>
            </label>
            <label class="toggle-row">
              <span>HDR Bloom</span>
              <div class="toggle active" id="toggle-bloom">
                <div class="toggle-thumb"></div>
              </div>
            </label>
            <label class="toggle-row">
              <span>Animations</span>
              <div class="toggle active" id="toggle-anim">
                <div class="toggle-thumb"></div>
              </div>
            </label>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div id="modal-overlay" style="display:none">
    <div id="modal-box">
      <div class="modal-crown" id="modal-icon">♛</div>
      <div class="modal-title" id="modal-title">Game Over</div>
      <div class="modal-body" id="modal-body">Checkmate!</div>
      <div class="modal-buttons">
        <button class="btn-primary" id="modal-new-game">Play Again</button>
        <button class="btn-glass" id="modal-close">Close</button>
      </div>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
